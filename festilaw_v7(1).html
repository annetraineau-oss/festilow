<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FestiLaw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--g1:#7B2FF7;--g2:#C850C0;--g3:#FF6B6B;--g4:#FFD93D;--card:#fff;--text:#1a1a2e;--muted:#6c6c8a;--bg:#f0edff;--green:#00C897;--red:#FF4757;--amber:#FFA502}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:16px 14px 60px}
.grad-bar{height:5px;border-radius:3px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4));margin-bottom:18px}
.hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:16px;margin-bottom:16px;color:#fff;flex-wrap:wrap;gap:6px}
.hud-item{font-size:14px;font-weight:700;display:flex;align-items:center;gap:4px}
.hud-cap{font-size:11px;background:rgba(255,71,87,.9);padding:3px 10px;border-radius:10px;font-weight:700}
.timer-pill{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:10px;font-weight:800;font-size:14px}
.timer-pill.urgent{background:rgba(255,71,87,.8);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.code-tracker{display:flex;justify-content:center;gap:10px;margin-bottom:20px}
.code-letter{width:46px;height:54px;border:3px solid #d4d0f0;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#d4d0f0;background:#fff;transition:all .4s cubic-bezier(.175,.885,.32,1.275)}
.code-letter.unlocked{border-color:var(--green);color:var(--green);background:#e8faf4;transform:scale(1.1) rotate(-3deg)}
.card{background:var(--card);border-radius:20px;padding:28px 22px;margin-bottom:18px;box-shadow:0 4px 20px rgba(123,47,247,.08);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3));border-radius:20px 20px 0 0}
.intro-wrap{text-align:center;padding:20px 10px}
.intro-emoji{font-size:64px;margin-bottom:10px;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.intro-title{font-size:36px;font-weight:900;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.intro-sub{font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.sms-bubble{background:linear-gradient(135deg,#e8e5ff,#f5e6ff);border-radius:18px 18px 18px 4px;padding:14px 18px;margin-bottom:14px;font-size:14px;line-height:1.6;max-width:92%}
.sms-sender{font-weight:800;font-size:12px;color:var(--g1);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .25s}
.btn:active{transform:scale(.95)}
.btn-primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;box-shadow:0 4px 15px rgba(123,47,247,.3)}
.btn-primary:hover{box-shadow:0 6px 25px rgba(123,47,247,.4);transform:translateY(-2px)}
.btn-go{background:linear-gradient(135deg,var(--green),#00e6a8);color:#fff;box-shadow:0 4px 15px rgba(0,200,151,.3)}
.btn-danger{background:linear-gradient(135deg,var(--red),#ff6b81);color:#fff}
.btn-next{background:linear-gradient(135deg,#e8faf4,#d0f5ea);color:#00875a;border:2px solid #b0ead5}
.btn-doc{background:linear-gradient(135deg,#fff3e0,#ffe0b2);color:#e65100;border:2px solid #ffcc80;font-size:13px;padding:10px 20px}
.stage-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 18px;border-radius:24px;font-size:13px;font-weight:800;margin-bottom:10px;color:#fff}
.stage-head{text-align:center;margin-bottom:16px}
.game-title{font-size:18px;font-weight:800;margin-bottom:6px;color:var(--g1)}
.game-desc{font-size:14px;color:var(--muted);margin-bottom:16px;line-height:1.6}
.step-dots{display:flex;gap:8px;margin-bottom:16px;justify-content:center}
.step-dot{width:12px;height:12px;border-radius:50%;background:#e0ddf0;transition:all .3s}
.step-dot.active{background:var(--g1);transform:scale(1.3);box-shadow:0 0 8px rgba(123,47,247,.4)}
.step-dot.done{background:var(--green)}
.situation-box{background:linear-gradient(135deg,#f8f7ff,#f0edff);border-radius:14px;padding:14px 18px;margin-bottom:16px;font-size:14px;line-height:1.6;border-left:4px solid var(--g1)}
.question-text{font-size:15px;font-weight:700;margin-bottom:14px}
.opt{padding:14px 18px;border:2px solid #e0ddf0;border-radius:14px;margin-bottom:10px;cursor:pointer;font-size:14px;line-height:1.5;transition:all .2s;background:#fff}
.opt:hover{border-color:var(--g1);background:#f8f7ff;transform:translateX(4px)}
.opt.selected{border-color:var(--g1);background:linear-gradient(135deg,#f0edff,#e8e5ff);font-weight:700}
.opt.correct-r{border-color:var(--green);background:#e8faf4;color:#00573a;cursor:default}
.opt.wrong-r{border-color:var(--red);background:#fff0f0;color:#8b0000;cursor:default}
.opt .fb{font-size:12px;margin-top:8px;font-style:italic;opacity:.85;line-height:1.5}
.retry-box{background:linear-gradient(135deg,#fff3e0,#ffe0b2);border:2px solid #ffcc80;border-radius:14px;padding:12px 16px;font-size:14px;color:#e65100;margin-bottom:14px;font-weight:700;text-align:center}
.piece-doc{background:#fffbf0;border:2px solid #ffe0b2;border-left:5px solid var(--amber);border-radius:0 14px 14px 0;padding:18px 20px;margin-bottom:18px;font-size:13px;line-height:1.7;color:#5d4037}
.piece-doc .doc-title{font-weight:800;font-size:14px;color:#bf360c;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.piece-doc .clause{padding:8px 0;border-bottom:1px dashed #ffe0b2}.piece-doc .clause:last-child{border-bottom:none}
.doc-panel{background:#fff;border:2px solid #ffe0b2;border-radius:16px;padding:20px;margin-bottom:18px;max-height:360px;overflow-y:auto}
.doc-section{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid #f0edff}.doc-section:last-child{border-bottom:none}
.doc-section-title{font-weight:800;font-size:14px;color:var(--amber);margin-bottom:6px}
.doc-section-text{font-size:13px;line-height:1.7;color:var(--muted)}
.trial-bubble{padding:14px 18px;border-radius:18px;margin-bottom:12px;font-size:14px;line-height:1.6}
.trial-bubble.judge{background:#f0edff;border:2px solid #d4d0f0;margin-right:30px;border-radius:18px 18px 18px 4px}
.trial-bubble.judge::before{content:'Le Juge';font-size:11px;font-weight:800;color:var(--g1);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.trial-bubble.plaintiff{background:#fff0f0;border:2px solid #ffc0c0;margin-right:30px;border-radius:18px 18px 18px 4px}
.trial-bubble.plaintiff::before{content:'Maxime';font-size:11px;font-weight:800;color:var(--red);display:block;margin-bottom:4px}
.trial-bubble.narrator{background:#f5f5f5;border:2px solid #ddd;font-style:italic;text-align:center;color:var(--muted);border-radius:18px}
.evidence-card{display:inline-block;padding:8px 16px;border-radius:12px;background:#fff3e0;border:1.5px solid #ffcc80;font-size:13px;color:#e65100;font-weight:700;margin:4px;animation:fadeUp .4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.code-input-area{text-align:center;padding:30px 10px}
.code-inputs{display:flex;justify-content:center;gap:12px;margin:20px 0}
.code-char{width:54px;height:62px;border:3px solid #d4d0f0;border-radius:14px;text-align:center;font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:var(--g1);background:#fff;text-transform:uppercase;transition:all .3s}
.code-char:focus{border-color:var(--g1);outline:none;box-shadow:0 0 12px rgba(123,47,247,.3)}
.code-char.valid{border-color:var(--green);background:#e8faf4;color:var(--green)}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.google-review{background:var(--card);border:2px solid #e0ddf0;border-radius:20px;padding:24px;max-width:420px;margin:20px auto;text-align:center}
.google-review .stars{font-size:32px;letter-spacing:6px;margin:8px 0}
.google-review .review-text{font-size:14px;line-height:1.6;color:var(--muted);font-style:italic;margin:12px 0}
.google-review .reviewer{font-size:13px;color:#aaa;font-weight:700}
.google-review .review-title{font-weight:800;font-size:16px;margin-bottom:4px}
.gameover{text-align:center;padding:30px 16px}
.gameover h2{font-size:28px;margin-bottom:10px;color:var(--red)}
.result-score{font-size:52px;font-weight:900;background:linear-gradient(135deg,var(--g1),var(--g2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.scene-wrap{border-radius:16px;overflow:hidden;margin-bottom:16px;position:relative;cursor:default}
.scene-wrap svg{display:block;width:100%}
.scene-wrap .hotspot{cursor:pointer;transition:opacity .2s}
.scene-wrap .hotspot:hover{opacity:.85}
.scene-wrap .hotspot.found{opacity:.3;pointer-events:none}
.found-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.found-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;animation:fadeUp .3s}
.found-chip.useful{background:#e8faf4;border:1.5px solid #5DCAA5;color:#085041}
.found-chip.leurre{background:#f5f5f5;border:1.5px solid #ddd;color:#999;text-decoration:line-through}
.scene-hint{font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center;font-weight:600}
.pulse-glow{animation:glowP 1.5s ease-in-out infinite}
@keyframes glowP{0%,100%{opacity:1}50%{opacity:.5}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:400px;width:92%;text-align:left;max-height:90vh;overflow-y:auto}
.modal-box .m-tag{display:inline-block;padding:4px 12px;border-radius:14px;font-size:12px;font-weight:800;margin-bottom:10px}
.modal-box .m-tag.useful{background:#e8faf4;color:#085041}
.modal-box .m-tag.leurre{background:#fff0f0;color:#c62828}
.modal-box .m-title{font-size:17px;font-weight:800;color:#1a1a2e;margin-bottom:8px}
.modal-box .m-text{font-size:13px;line-height:1.7;color:#555;margin-bottom:16px;white-space:pre-line}
.modal-box .m-img{display:block;max-width:140px;max-height:140px;margin:0 auto 16px;object-fit:contain}
.modal-box .m-btn{display:block;width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#7B2FF7,#C850C0);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.scene-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
.scene-grid .scene-item{cursor:pointer;border-radius:16px;padding:14px 10px;background:#f8f7ff;border:2.5px solid #e0ddf0;text-align:center;transition:all .25s}
.scene-grid .scene-item:hover{border-color:#7B2FF7;background:#f0edff;transform:scale(1.05)}
.scene-grid .scene-item.found{opacity:.35;pointer-events:none;border-color:#ccc;transform:none}
.scene-grid .scene-item img{max-width:100%;max-height:90px;object-fit:contain;display:block;margin:0 auto 8px}
.scene-grid .scene-item span{font-size:12px;font-weight:700;color:#7B2FF7}
.scene-grid .scene-item.found span{color:#aaa}
.ambiance{background:linear-gradient(135deg,#f0edff,#e8e5ff);border-radius:16px;padding:18px;margin-bottom:18px;font-size:14px;line-height:1.7;color:#3a3a5a;border-left:5px solid #7B2FF7}
.ambiance strong{color:#7B2FF7}
@media(max-width:500px){.hud{padding:8px 12px}.intro-title{font-size:26px}.card{padding:20px 16px}.trial-bubble{margin-left:0!important;margin-right:0!important}}
</style>
</head>

{situation:'Th\u00e9o a montr\u00e9 au chanteur des photos d\'une \u00e9dition pr\u00e9c\u00e9dente en salle, alors que le festival est en plein air.',options:['Vice du consentement : dol','Vice du consentement : erreur','Vice du consentement : violence','D\u00e9faut de contenu licite'],correct:0,explain:'Man\u0153uvres volontaires (fausses photos) = dol (art. 1137 C. civ.), pas simple erreur.'},
{situation:'Le contrat pr\u00e9voit un cachet de 500 \u20ac + visibilit\u00e9 sur les r\u00e9seaux sociaux du festival.',options:['Absence de contrepartie : contrat nul','Contrepartie d\u00e9risoire : contrat annulable','D\u00e9faut de contenu licite','Aucun probl\u00e8me : la contrepartie existe'],correct:3,explain:'500 \u20ac + visibilit\u00e9 = contrepartie r\u00e9elle. Le montant peut \u00eatre modeste sans \u00eatre d\u00e9risoire. Attention : d\u00e9risoire \u2260 modeste.'},
{situation:'Le guitariste affirme qu\'on l\'a menac\u00e9 de le blacklister s\'il ne signait pas.',options:['Vice du consentement : violence','Vice du consentement : dol','D\u00e9faut de capacit\u00e9','Simple n\u00e9gociation'],correct:0,explain:'Menace de blacklister = violence morale (art. 1140 C. civ.).'}
]},
{type:'cas',title:'Electro Chaos veut annuler',
desc:'Le groupe refuse de monter sur sc\u00e8ne \u00e0 2h du concert. Th\u00e9o a vendu 800 billets. Le cachet de 500 \u20ac a d\u00e9j\u00e0 \u00e9t\u00e9 vers\u00e9.',
steps:[
{question:'Comment qualifier la situation du chanteur tromp\u00e9 par les photos ?',options:['Nullit\u00e9 relative pour dol','Nullit\u00e9 absolue pour illicit\u00e9','R\u00e9solution pour inex\u00e9cution','Caducit\u00e9'],correct:0,explain:'Le dol = vice du consentement = nullit\u00e9 relative (art. 1131 C. civ.).'},
{question:'Th\u00e9o veut forcer le groupe \u00e0 jouer. Peut-il obtenir l\'ex\u00e9cution forc\u00e9e ?',options:['Oui, le contrat est la loi des parties','Non, impossible si le d\u00e9biteur a quitt\u00e9 les lieux','Oui, par r\u00e9f\u00e9r\u00e9','Non, l\'ex\u00e9cution forc\u00e9e d\'une obligation de faire est exclue si elle porte atteinte \u00e0 la libert\u00e9 individuelle'],correct:3,explain:'Art. 1221 C. civ. : on ne peut contraindre physiquement un artiste. Reste les dommages-int\u00e9r\u00eats.'},
{question:'Si la nullit\u00e9 pour dol est prononc\u00e9e, que devient le cachet de 500 \u20ac ?',options:['Th\u00e9o le conserve car le groupe est fautif','Restitutions r\u00e9ciproques : le groupe rend les 500 \u20ac','Th\u00e9o le conserve comme dommages-int\u00e9r\u00eats','Le juge d\u00e9cide librement'],correct:1,explain:'Nullit\u00e9 = an\u00e9antissement r\u00e9troactif + restitutions (art. 1178). Mais c\'est Th\u00e9o l\'auteur du dol : le groupe pourrait obtenir des DI en plus.'}
]},
{type:'piece',title:'Analyse du contrat sign\u00e9',
desc:'Analyse chaque clause du contrat.',
document:{title:'CONTRAT DE PRESTATION ARTISTIQUE \u2014 FestiLaw 2025',clauses:['Art. 3 \u2014 L\'artiste se produira le 21 juin 2025 de 22h \u00e0 minuit, sc\u00e8ne principale.','Art. 4 \u2014 Cachet : 500 \u20ac + promotion sur les r\u00e9seaux du festival (min. 3 posts).','Art. 5 \u2014 Annulation par l\'artiste moins de 48h avant : l\'organisateur conserve le cachet (clause p\u00e9nale).','Art. 7 \u2014 L\'organisateur peut modifier unilat\u00e9ralement lieu, horaire et dur\u00e9e.','Art. 9 \u2014 Litiges soumis \u00e0 un arbitre d\u00e9sign\u00e9 par l\'organisateur.']},
steps:[
{question:'Art. 3 : cette clause pose-t-elle probl\u00e8me ?',options:['Oui, horaire trop vague','Non, objet d\u00e9termin\u00e9 : date, horaire, lieu','Oui, il manque la r\u00e9mun\u00e9ration'],correct:1,explain:'Art. 3 valide. Obligation d\u00e9termin\u00e9e. La r\u00e9mun\u00e9ration figure \u00e0 l\'art. 4.'},
{question:'Art. 5 : la clause p\u00e9nale est-elle valide ?',options:['Toujours valide entre pros','Oui, mais le juge peut la r\u00e9viser si excessive','Non, on ne peut jamais conserver le cachet','La clause p\u00e9nale est interdite'],correct:1,explain:'Clause p\u00e9nale licite (art. 1231-5), mais r\u00e9visable si manifestement excessive.'},
{question:'Art. 7 : modification unilat\u00e9rale ?',options:['Valide, l\'organisateur doit s\'adapter','Abusive : d\u00e9s\u00e9quilibre significatif sur les \u00e9l\u00e9ments essentiels','Nulle pour violation de l\'ordre public','Valide si l\'artiste a sign\u00e9'],correct:1,explain:'Modifier lieu + horaire + dur\u00e9e = \u00e9l\u00e9ments essentiels. D\u00e9s\u00e9quilibre significatif (art. 1171). Signer ne valide pas une clause abusive.'},
{question:'Art. 9 : clause d\'arbitrage opposable ?',options:['Oui, arbitrage toujours possible','Non, l\'arbitre d\u00e9sign\u00e9 par une seule partie viole l\'\u00e9galit\u00e9','Non, arbitrage interdit en France','Oui si le litige d\u00e9passe 10 000 \u20ac'],correct:1,explain:'Arbitre d\u00e9sign\u00e9 par une seule partie = violation du principe d\'ind\u00e9pendance. Clause nulle.'}
]}
]},
{id:1,name:'Vente',color:'#0F6E56',bg:'#E1F5EE',letter:'E',
intro:'La sono a l\u00e2ch\u00e9. Th\u00e9o a achet\u00e9 du mat\u00e9riel d\'occasion \u00e0 un vendeur pro, mais rien ne fonctionne...',
games:[
{type:'qualify',title:'Diagnostic du mat\u00e9riel',desc:'Qualifie chaque probl\u00e8me.',
steps:[
{situation:'L\'ampli produit un gr\u00e9sillement permanent. D\u00e9faut ind\u00e9celable \u00e0 l\'essai.',options:['D\u00e9faut de conformit\u00e9','Vice cach\u00e9','D\u00e9faut de d\u00e9livrance','Erreur sur les qualit\u00e9s essentielles'],correct:1,explain:'Impropre \u00e0 l\'usage, ant\u00e9rieur, non apparent = vice cach\u00e9 (art. 1641).'},
{situation:'Il manque 2 enceintes par rapport au bon de commande.',options:['Vice cach\u00e9','D\u00e9faut de d\u00e9livrance conforme','Erreur sur la substance','Dol du vendeur'],correct:1,explain:'La chose livr\u00e9e ne correspond pas en quantit\u00e9 = d\u00e9faut de d\u00e9livrance (art. 1604).'},
{situation:'C\u00e2blage aux normes 2005, pas aux normes actuelles. Le vendeur n\'a rien dit.',options:['Vice cach\u00e9','D\u00e9faut de conformit\u00e9','R\u00e9ticence dolosive du vendeur','Aucun probl\u00e8me si \u00e7a fonctionne'],correct:2,explain:'Silence intentionnel du vendeur pro sur la non-conformit\u00e9 = r\u00e9ticence dolosive (art. 1137 al. 2).'},
{situation:'Le vendeur a d\u00e9mont\u00e9 l\'ampli pour masquer une soudure cass\u00e9e.',options:['Vice cach\u00e9 simple','Vice cach\u00e9 + mauvaise foi','Dol par man\u0153uvres','D\u00e9faut de d\u00e9livrance'],correct:2,explain:'Masquer volontairement un d\u00e9faut = man\u0153uvres positives = dol (art. 1137). Plus grave qu\'un vice cach\u00e9.'}
]},
{type:'cas',title:'Le vendeur r\u00e9siste',desc:'Le vendeur r\u00e9pond : \u00ab Vendu en l\'\u00e9tat, garantie 3 mois d\u00e9pass\u00e9e. \u00bb Achat il y a 4 mois.',
steps:[
{question:'La clause \u00ab vendu en l\'\u00e9tat \u00bb est-elle opposable ?',options:['Oui, Th\u00e9o a accept\u00e9','Non, un vendeur pro ne peut s\'exon\u00e9rer des vices cach\u00e9s','Non, clause interdite par le Code civil','Oui car mat\u00e9riel d\'occasion'],correct:1,explain:'Vendeur pro = pr\u00e9sum\u00e9 conna\u00eetre les vices (pr\u00e9somption irr\u00e9fragable). Clause inopposable.'},
{question:'Le d\u00e9lai de 3 mois est-il valable ?',options:['Oui, libert\u00e9 contractuelle','Non, d\u00e9lai l\u00e9gal = 2 ans \u00e0 compter de la d\u00e9couverte','Non, d\u00e9lai de 5 ans','Oui car Th\u00e9o est pro'],correct:1,explain:'D\u00e9lai = 2 ans \u00e0 compter de la d\u00e9couverte du vice (art. 1648). Non r\u00e9ductible face \u00e0 un non-pro.'},
{question:'Festival dans 48h. Quelle action ?',options:['R\u00e9solution de la vente','R\u00e9f\u00e9r\u00e9 pour remplacement','R\u00e9duction du prix + location','Ex\u00e9cution par un tiers aux frais du vendeur apr\u00e8s mise en demeure'],correct:3,explain:'Art. 1222 : ex\u00e9cution par un tiers aux frais du d\u00e9biteur apr\u00e8s mise en demeure. Le plus rapide.'}
]},
{type:'piece',title:'Analyse de la facture',desc:'Analyse les mentions de la facture.',
document:{title:'FACTURE N\u00b0 2025-0347 \u2014 SonoPlus SARL',clauses:['Lot sono : 2 amplis, 6 enceintes, c\u00e2blage \u2014 4 500 \u20ac HT','Mention : \u00ab Mat\u00e9riel test\u00e9 et garanti 3 mois \u00bb','Mention : \u00ab Vendu en l\'\u00e9tat, acheteur a examin\u00e9 le mat\u00e9riel \u00bb','Mention : \u00ab Aucune r\u00e9clamation pass\u00e9 la livraison \u00bb','CG : Tribunal de commerce de Marseille']},
steps:[
{question:'\u00ab Test\u00e9 et garanti 3 mois \u00bb : cons\u00e9quence ?',options:['Remplace la garantie l\u00e9gale','S\'ajoute \u00e0 la garantie l\u00e9gale','Prouve la mauvaise foi du vendeur','Aucune valeur'],correct:1,explain:'Garantie commerciale s\'ajoute aux garanties l\u00e9gales (art. L217-15). \u00ab Test\u00e9 \u00bb renforce l\'argument de mauvaise foi.'},
{question:'\u00ab Acheteur a examin\u00e9 le mat\u00e9riel \u00bb : Th\u00e9o perd-il son recours ?',options:['Oui, accept\u00e9 en connaissance de cause','Non, un vice cach\u00e9 est par d\u00e9finition ind\u00e9celable','Oui, renonciation \u00e0 garantie','Non, mais Th\u00e9o devra prouver sa diligence'],correct:1,explain:'Vice cach\u00e9 = non d\u00e9celable lors d\'un examen normal (art. 1642). Clause sans effet.'},
{question:'\u00ab Aucune r\u00e9clamation pass\u00e9 la livraison \u00bb ?',options:['D\u00e9lai contractuel valide','R\u00e9put\u00e9e non \u00e9crite : vise \u00e0 \u00e9carter la garantie l\u00e9gale','Valide si d\u00e9lai raisonnable','Contraire \u00e0 l\'ordre public \u00e9conomique'],correct:1,explain:'Clause qui supprime tout recours = r\u00e9put\u00e9e non \u00e9crite face \u00e0 un vendeur pro.'},
{question:'Tribunal de commerce de Marseille : opposable ?',options:['Oui, litige entre pros','D\u00e9pend : si Th\u00e9o est consommateur, clause abusive','Toujours comp\u00e9tent pour les ventes','Oui si montant sup. \u00e0 10 000 \u20ac'],correct:1,explain:'Si Th\u00e9o = consommateur, clause attributive de comp\u00e9tence = abusive (art. R212-2).'}
]}
]},
{id:2,name:'Consommation',color:'#E65100',bg:'#FFF3E0',letter:'G',
intro:'SMS du chef cuistot : \u00ab Patron, un festivalier menace d\'appeler la r\u00e9pression des fraudes ! \u00bb',
games:[
{type:'qualify',title:'Pratiques du festival au crible',desc:'Qualifie chaque pratique constat\u00e9e.',
steps:[
{situation:'Le stand de burgers n\'affiche aucun prix.',options:['Pratique commerciale trompeuse','Pratique agressive','Infraction aux obligations d\'information','Aucune infraction si prix raisonnable'],correct:2,explain:'Obligation d\'affichage des prix (art. L112-1 C. conso.). Ni trompeuse ni agressive.'},
{situation:'Un vendeur de goodies suit un festivalier 10 minutes en insistant.',options:['Pratique trompeuse','Pratique agressive','Harc\u00e8lement moral','Technique de vente l\u00e9gitime'],correct:1,explain:'Sollicitations r\u00e9p\u00e9t\u00e9es alt\u00e9rant la libert\u00e9 de choix = pratique agressive (art. L121-6).'},
{situation:'Affiche \u00ab DJ Blaze en exclusivit\u00e9 mondiale \u00bb alors qu\'il joue ailleurs.',options:['Pratique trompeuse','Publicit\u00e9 comparative illicite','Pratique agressive','Dol'],correct:0,explain:'All\u00e9gation fausse induisant en erreur = pratique trompeuse (art. L121-2).'},
{situation:'Cocktail \u00ab surprise \u00bb sans composition ni allerg\u00e8nes.',options:['Pratique trompeuse','Infraction info allerg\u00e8nes','Mise en danger','Aucune infraction, c\'est le concept'],correct:1,explain:'Info allerg\u00e8nes obligatoire (r\u00e8glement UE 1169/2011), m\u00eame pour un \u00ab surprise \u00bb.'},
{situation:'Stand cr\u00eapes : 1 cr\u00eape offerte pour 3 boissons.',options:['Vente li\u00e9e prohib\u00e9e','Pratique trompeuse','Vente \u00e0 perte','Offre promotionnelle licite'],correct:3,explain:'Offre promo licite. Pas de vente li\u00e9e : l\'achat des boissons n\'est pas conditionn\u00e9.'}
]},
{type:'cas',title:'Le billet pi\u00e9g\u00e9',desc:'Un festivalier brandit son billet. 6 clauses au verso en petits caract\u00e8res.',
steps:[
{question:'\u00ab Aucun remboursement en cas d\'annulation par l\'organisateur. \u00bb',options:['Licite, risque assum\u00e9','Abusive : supprime le droit \u00e0 r\u00e9paration','Clause grise','Nulle pour violation de l\'ordre public'],correct:1,explain:'Liste noire (art. R212-1, 5\u00b0) : supprime le droit \u00e0 r\u00e9paration. R\u00e9put\u00e9e non \u00e9crite.'},
{question:'\u00ab L\'organisateur peut modifier la programmation sans pr\u00e9avis. \u00bb',options:['Abusive dans tous les cas','Licite si modification mineure','Nulle','Licite car le festivalier a accept\u00e9'],correct:1,explain:'D\u00e9pend de l\'ampleur. Changer l\'ordre de passage = ok. Supprimer la t\u00eate d\'affiche = abusif.'},
{question:'\u00ab Tout participant renonce \u00e0 tout recours en justice. \u00bb',options:['Licite si sign\u00e9','Abusive : supprime le droit fondamental d\'agir','Clause compromissoire valide','Clause grise'],correct:1,explain:'Renonciation au droit d\'agir en justice = abusive (art. R212-1). Droit fondamental.'},
{question:'\u00ab L\'organisateur d\u00e9cline toute responsabilit\u00e9 pour dommage corporel. \u00bb',options:['Licite, risque assum\u00e9 en plein air','Abusive et contraire \u00e0 l\'ordre public','Valide entre pros','Clause grise'],correct:1,explain:'Exon\u00e9ration pour dommage corporel = interdite. R\u00e8gle d\'ordre public.'}
]},
{type:'piece',title:'Courrier DGCCRF',desc:'Th\u00e9o re\u00e7oit un PV de contr\u00f4le.',
document:{title:'DGCCRF \u2014 Proc\u00e8s-verbal de contr\u00f4le',clauses:['Constat 1 : Absence d\'affichage des prix sur 2 stands sur 5.','Constat 2 : All\u00e9gation \u00ab exclusivit\u00e9 mondiale \u00bb non \u00e9tay\u00e9e.','Constat 3 : Clauses du billet potentiellement abusives.','Constat 4 : Jeu-concours \u00ab 100% gagnant \u00bb, lots d\u00e9risoires.','Proposition : amende 3 000 \u20ac + mise en conformit\u00e9 sous 30 jours.']},
steps:[
{question:'Constat 1 (d\u00e9faut d\'affichage) : nature de l\'infraction ?',options:['Infraction p\u00e9nale','Infraction administrative (amende)','Infraction civile','Simple avertissement'],correct:1,explain:'D\u00e9faut d\'affichage = infraction administrative (art. L131-5 C. conso.).'},
{question:'Constat 2 (fausse exclusivit\u00e9) : quelle sanction ?',options:['Simple amende administrative','Jusqu\'\u00e0 2 ans + 300 000 \u20ac','Aucune, c\'est de la pub','Interdiction d\'exercer'],correct:1,explain:'Pratique trompeuse = d\u00e9lit (art. L132-2). 2 ans + 300 000 \u20ac.'},
{question:'Constat 4 (\u00ab 100% gagnant \u00bb, lots d\u00e9risoires) ?',options:['Aucun probl\u00e8me','Pratique trompeuse','Loterie ill\u00e9gale','Publicit\u00e9 mensong\u00e8re uniquement'],correct:1,explain:'\u00ab 100% gagnant \u00bb avec lots d\u00e9risoires = trompeur (art. L121-2).'},
{question:'Amende 3 000 \u20ac : Th\u00e9o peut-il contester ?',options:['Non, d\u00e9cisions DGCCRF d\u00e9finitives','Oui, tribunal administratif','Oui, juge judiciaire','Non, sauf bonne foi'],correct:2,explain:'Amende administrative contestable devant le juge judiciaire (art. L470-2 C. com.).'}
]}
]},
{id:3,name:'Responsabilit\u00e9',color:'#C62828',bg:'#FFEBEE',letter:'A',
intro:'DJ Blaze a gliss\u00e9 sur une flaque backstage. Poignet cass\u00e9. Il menace de poursuivre Th\u00e9o...',
games:[
{type:'qualify',title:'Identifier les conditions',desc:'Pour chaque situation : fait g\u00e9n\u00e9rateur, dommage, lien de causalit\u00e9, puis r\u00e9gime.',
steps:[
{situation:'Un projecteur tombe sur une festivalière (billet). Entorse au poignet.\n\nQuel est le fait g\u00e9n\u00e9rateur ?',options:['Chute du projecteur (fait d\'une chose)','Musique trop forte','Position au premier rang','N\u00e9gligence de la festivalière'],correct:0,explain:'Fait g\u00e9n\u00e9rateur = chute du projecteur = fait d\'une chose (art. 1242 al. 1).'},
{situation:'M\u00eame situation. Quel est le dommage ?',options:['Corporel (entorse) uniquement','Corporel + pr\u00e9judice d\'agr\u00e9ment certain','Corporel + moral automatique','Aucun pr\u00e9judice car entorse b\u00e9nigne'],correct:0,explain:'Dommage certain = entorse (corporel). Agr\u00e9ment et moral doivent \u00eatre prouv\u00e9s s\u00e9par\u00e9ment.'},
{situation:'Le lien de causalit\u00e9 est-il \u00e9tabli ?',options:['\u00c9tabli : projecteur tomb\u00e9 directement sur elle','Discutable : elle aurait pu \u00e9viter','Rompu : force majeure','Pr\u00e9sum\u00e9 car concomitant'],correct:0,explain:'Lien direct et certain. Ni pr\u00e9sum\u00e9 ni rompu par la force majeure (projecteur mal fix\u00e9 \u2260 impr\u00e9visible).'},
{situation:'Les 3 conditions sont r\u00e9unies. Quel r\u00e9gime ?',options:['Extracontractuelle (art. 1240)','Contractuelle : billet = contrat + obligation de s\u00e9curit\u00e9','Responsabilit\u00e9 p\u00e9nale','Administrative'],correct:1,explain:'Billet = contrat avec obligation de s\u00e9curit\u00e9. R\u00e9gime contractuel. Non-cumul interdit la voie d\u00e9lictuelle.'}
]},
{type:'cas',title:'Le cas DJ Blaze',desc:'DJ Blaze : fracture du poignet, 6 semaines d\'arr\u00eat, 9 000 \u20ac de cachets perdus, souffrance morale.',
steps:[
{question:'Quel fait g\u00e9n\u00e9rateur retenir ?',options:['Flaque uniquement','Flaque + absence de signalisation','Sol glissant + n\u00e9gligence technique','Chaussures inadapt\u00e9es de DJ Blaze'],correct:1,explain:'Double fait g\u00e9n\u00e9rateur : flaque (chose) + absence signalisation (n\u00e9gligence). Les chaussures = possible faute victime, pas fait g\u00e9n\u00e9rateur.'},
{question:'Les cachets perdus (9 000 \u20ac) sont-ils un pr\u00e9judice certain ?',options:['Oui, contrats sign\u00e9s','Non, pr\u00e9judice hypoth\u00e9tique','Perte de chance, pas \u00e0 100%','Oui car arr\u00eat m\u00e9dical'],correct:0,explain:'Si contrats sign\u00e9s produits = pr\u00e9judice certain. Pas une perte de chance.'},
{question:'DJ Blaze avait un poignet fragile. Impact sur la causalit\u00e9 ?',options:['Rompt le lien','Ne rompt pas le lien','Th\u00e9o responsable de l\'aggravation seulement','Au cas par cas'],correct:1,explain:'Pr\u00e9disposition de la victime ne rompt pas le lien de causalit\u00e9 (Civ. 2e, 2003).'},
{question:'Th\u00e9o avait d\u00e9l\u00e9gu\u00e9 le nettoyage \u00e0 CleanFest SARL. Impact ?',options:['Th\u00e9o totalement exon\u00e9r\u00e9','Th\u00e9o reste responsable envers DJ Blaze, recours contre CleanFest','DJ Blaze doit agir contre CleanFest','La d\u00e9l\u00e9gation supprime le fait g\u00e9n\u00e9rateur'],correct:1,explain:'Th\u00e9o reste d\u00e9biteur de l\'obligation de s\u00e9curit\u00e9 (effet relatif). Recours possible contre CleanFest.'}
]},
{type:'piece',title:'La r\u00e9clamation de DJ Blaze',desc:'Analyse le courrier de r\u00e9clamation.',
document:{title:'COURRIER RECOMMAND\u00c9 \u2014 De M. Blaze \u00e0 M. Th\u00e9o',clauses:['Mise en demeure pour les pr\u00e9judices suivants :','1. Frais m\u00e9dicaux : 2 300 \u20ac (certificat m\u00e9dical)','2. Perte de cachets : 9 000 \u20ac (3 concerts)','3. Pr\u00e9judice moral : 5 000 \u20ac','4. Pr\u00e9judice d\'image : 10 000 \u20ac (vid\u00e9o virale)','Action en responsabilit\u00e9 d\u00e9lictuelle devant le TJ.']},

});
h+='</div>';

h+='<div class="found-bar">';
sc.items.forEach(function(it){

h+='<div class="hud"><div class="hud-item">&#x2B50; '+S.score+'</div></div>';
h+='<div class="card code-input-area"><div style="font-size:52px;margin-bottom:10px">&#x1F510;</div>';
h+='<h2 style="font-size:26px;margin-bottom:8px">La porte finale</h2>';
h+='<p style="color:var(--muted);font-size:14px">Saisis le code pour entrer au tribunal.</p>';
h+='<div class="code-inputs" id="codeInputs">';for(let i=0;i<5;i++)h+='<input class="code-char'+(S.codeLetters[i]?' valid':'')+'" type="text" maxlength="1" id="cc'+i+'" '+(S.codeLetters[i]?'value="'+CODE_WORD[i]+'" readonly':'')+' oninput="codeInput(this,'+i+')">';
h+='</div><button class="btn btn-primary" onclick="submitCode()">Ouvrir la porte</button>';
h+='<p id="codeError" style="color:var(--red);font-size:13px;margin-top:10px;min-height:20px"></p></div>';}

else if(S.screen==='trial'){
h+='<div class="hud"><div class="hud-item">&#x2B50; '+S.score+'</div><div class="hud-item">&#x1F3DB;&#xFE0F; Proc\u00e8s</div></div>';
if(S.trialPhase===0){
h+='<div class="card"><h2 style="font-size:20px;margin-bottom:16px;color:var(--g1)">'+TRIAL.phase1.title+'</h2><div style="margin-bottom:16px">';
TRIAL.phase1.intro.forEach(d=>{h+='<div class="trial-bubble '+d.type+'">'+esc(d.text)+'</div>'});h+='</div>';
h+='<p style="font-size:14px;color:var(--muted);margin-bottom:14px">S\u00e9lectionne les <strong>'+TRIAL.phase1.correctCount+'</strong> arguments solides :</p>';
TRIAL.phase1.arguments.forEach((arg,i)=>{let cls='opt';if(S.trialSubmitted){if(arg.correct)cls+=' correct-r';else if(S.trialSelected.includes(i))cls+=' wrong-r';}else if(S.trialSelected.includes(i))cls+=' selected';
h+='<div class="'+cls+'" '+(S.trialSubmitted?'':'onclick="toggleTrialArg('+i+')"')+'>'+esc(arg.text);if(S.trialSubmitted)h+='<div class="fb">'+esc(arg.feedback)+'</div>';h+='</div>';});
if(!S.trialSubmitted)h+='<button class="btn btn-primary" style="margin-top:14px" onclick="submitTrialP1()">Pr\u00e9senter mes arguments</button>';
else{h+='<p style="margin-top:14px;font-weight:800;color:var(--green)">+'+S.trialScore+' pts</p>';h+='<button class="btn btn-go" style="margin-top:10px" onclick="startTrialP2()">Les objections du juge</button>';}h+='</div>';}
else if(S.trialPhase===1){let round=TRIAL.phase2.rounds[S.trialRound];
h+='<div class="card"><h2 style="font-size:20px;margin-bottom:4px;color:var(--g1)">'+TRIAL.phase2.title+'</h2><p style="font-size:13px;color:var(--muted);margin-bottom:16px">Objection '+(S.trialRound+1)+'/'+TRIAL.phase2.rounds.length+'</p><div style="margin-bottom:16px">';
round.dialogue.forEach(d=>{h+='<div class="trial-bubble '+d.type+'">'+esc(d.text)+'</div>'});h+='</div>';
round.options.forEach((opt,i)=>{let cls='opt';if(S.trialSubmitted){if(opt.correct)cls+=' correct-r';else if(S.trialSelected.includes(i))cls+=' wrong-r';}else if(S.trialSelected.includes(i))cls+=' selected';
h+='<div class="'+cls+'" '+(S.trialSubmitted?'':'onclick="selectTrialOpt('+i+')"')+'>'+esc(opt.text);if(S.trialSubmitted)h+='<div class="fb">'+esc(opt.feedback)+'</div>';h+='</div>';});
if(!S.trialSubmitted&&S.trialSelected.length)h+='<button class="btn btn-primary" style="margin-top:12px" onclick="submitTrialRound()">Valider</button>';
if(S.trialSubmitted){if(round.evidence)h+='<div style="margin-top:10px"><div class="evidence-card">&#x1F4C4; '+esc(round.evidence)+'</div></div>';
if(S.trialRound<TRIAL.phase2.rounds.length-1)h+='<button class="btn btn-next" style="margin-top:14px" onclick="nextTrialRound()">Objection suivante</button>';
else h+='<button class="btn btn-go" style="margin-top:14px" onclick="showVerdict()">Attendre le verdict</button>';}h+='</div>';}
else if(S.trialPhase===2){let fs=Math.min(S.score,Math.floor(MAX_SCORE*S.maxScoreRatio));let rev=REVIEWS[0];for(let r of REVIEWS)if(fs>=r.min)rev=r;let won=fs>=Math.floor(MAX_SCORE*.5);
h+='<div class="card" style="text-align:center;padding:30px 20px"><div style="margin-bottom:16px">';
if(won){h+='<div class="trial-bubble judge" style="text-align:left;margin:0 0 10px">Le tribunal reconna\u00eet la diligence de Th\u00e9o. Demandes partiellement rejet\u00e9es.</div><div class="trial-bubble narrator">Th\u00e9o sourit.</div>';}
else{h+='<div class="trial-bubble judge" style="text-align:left;margin:0 0 10px">Arguments in\u00e9gaux. Responsabilit\u00e9 partielle retenue.</div><div class="trial-bubble narrator">Th\u00e9o baisse les yeux.</div>';}
h+='</div><div style="padding:16px"><div class="result-score">'+fs+'</div><div style="font-size:14px;color:var(--muted);font-weight:700">points</div></div>';
h+='<div class="google-review"><div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Avis Google</div><div class="stars">';for(let i=0;i<5;i++)h+=i<rev.stars?'&#x2B50;':'&#x2606;';
h+='</div><div class="review-title">'+esc(rev.title)+'</div><div class="review-text">\u00ab '+esc(rev.text)+' \u00bb</div><div class="reviewer">\u2014 '+esc(rev.author)+'</div></div>';
if(S.trialEvidence.length){h+='<div style="margin-top:16px;text-align:left"><p style="font-size:13px;color:var(--muted);font-weight:700">Pi\u00e8ces :</p>';S.trialEvidence.forEach(e=>{h+='<div class="evidence-card">&#x1F4C4; '+esc(e)+'</div>'});h+='</div>';}
h+='<button class="btn btn-primary" style="margin-top:24px" onclick="resetGame()">Rejouer</button></div>';}}

a.innerHTML=h;
if(S.screen==='code'){for(let i=0;i<5;i++){let el=document.getElementById('cc'+i);if(el&&!el.value){el.focus();break}}}
}

function findSceneItem(i){
let sc=SCENES[S.stage],it=sc.items[i];
if(S.foundItems.includes(it.id))return;
S.foundItems.push(it.id);
var d=document.createElement('div');d.className='modal-overlay';d.id='itemModal';
d.onclick=function(e){if(e.target===d)closeItemModal()};
d.innerHTML='<div class="modal-box">'+
'<div class="m-tag '+(it.useful?'useful':'leurre')+'">'+(it.useful?'Pi\u00e8ce utile':'Pas de valeur juridique')+'</div>'+
'<img class="m-img" src="'+IMG[it.imgKey]+'" alt="">'+
'<div class="m-title">'+it.title+'</div>'+
'<div class="m-text">'+it.text+'</div>'+
'<button class="m-btn" onclick="closeItemModal()">Compris</button></div>';
document.body.appendChild(d);
}
function closeItemModal(){var m=document.getElementById('itemModal');if(m)m.remove();render()}
function endScene(){S.scenePhase=false;S.gameIdx=0;S.stepIdx=0;S.selected=-1;S.submitted=false;S.stepAttempts=0;S.retryMsg='';startTimer();render()}
function startGame(){S.screen='stage';S.stage=0;S.gameIdx=0;S.stepIdx=0;S.selected=-1;S.submitted=false;S.stepAttempts=0;S.retryMsg='';S.docOpen=false;S.scenePhase=true;S.foundItems=[];render()}
function resetGame(){S={screen:'intro',stage:0,gameIdx:0,stepIdx:0,score:0,lives:5,combo:0,maxCombo:0,timer:0,timerInterval:null,selected:-1,codeLetters:Array(5).fill(false),trialPhase:0,trialRound:0,trialScore:0,trialSelected:[],trialSubmitted:false,trialEvidence:[],submitted:false,gameOverCount:0,maxScoreRatio:1,stepAttempts:0,retryMsg:'',docOpen:false,scenePhase:true,foundItems:[]};stopTimer();render()}
function continueAfterGameOver(){S.screen='stage';S.lives=3;S.combo=0;S.stepAttempts=0;S.retryMsg='';S.selected=-1;S.submitted=false;render()}
function selectOption(i){if(S.submitted)return;S.selected=i;render()}
function toggleDoc(){S.docOpen=!S.docOpen;render()}
function submitStep(){if(S.selected<0||S.submitted)return;let g=STAGES[S.stage].games[S.gameIdx],step=g.steps[S.stepIdx];
if(S.selected===step.correct){S.submitted=true;S.retryMsg='';S.combo++;if(S.combo>S.maxCombo)S.maxCombo=S.combo;addScore(100+(S.combo>1?S.combo*15:0));}
else{S.stepAttempts++;if(S.stepAttempts>=2){S.submitted=true;S.retryMsg='';S.combo=0;S.lives--;S.score=Math.max(0,S.score-30);
if(S.lives<=0){S.gameOverCount++;if(S.gameOverCount===1)S.maxScoreRatio=.7;else if(S.gameOverCount===2)S.maxScoreRatio=.5;else S.maxScoreRatio=.3;S.screen='gameover';stopTimer();}}
else{S.retryMsg='Mauvaise r\u00e9ponse. R\u00e9fl\u00e9chis et essaie encore.';S.selected=-1;}}render()}
function nextStep(){S.stepIdx++;S.selected=-1;S.submitted=false;S.stepAttempts=0;S.retryMsg='';render()}
function nextGame(){S.gameIdx++;S.stepIdx=0;S.selected=-1;S.submitted=false;S.stepAttempts=0;S.retryMsg='';S.docOpen=false;render()}
function nextStage(){S.codeLetters[S.stage]=true;S.stage++;S.gameIdx=0;S.stepIdx=0;S.selected=-1;S.submitted=false;S.stepAttempts=0;S.retryMsg='';S.docOpen=false;S.scenePhase=true;S.foundItems=[];render()}
function goToCode(){S.codeLetters[S.stage]=true;stopTimer();S.screen='code';render()}
function codeInput(el,i){el.value=el.value.toUpperCase();if(el.value&&i<4){let n=document.getElementById('cc'+(i+1));if(n&&!n.readOnly)n.focus()}}
function submitCode(){let w='';for(let i=0;i<5;i++){let el=document.getElementById('cc'+i);w+=el?el.value:''}
if(w.toUpperCase()===CODE_WORD){S.screen='trial';S.trialPhase=0;S.trialRound=0;S.trialScore=0;S.trialSelected=[];S.trialSubmitted=false;S.trialEvidence=[];render()}
else{document.getElementById('codeError').textContent='Code incorrect.';document.getElementById('codeInputs').classList.add('shake');setTimeout(()=>document.getElementById('codeInputs').classList.remove('shake'),500)}}
function toggleTrialArg(i){if(S.trialSubmitted)return;let idx=S.trialSelected.indexOf(i);if(idx>-1)S.trialSelected.splice(idx,1);else if(S.trialSelected.length<TRIAL.phase1.correctCount)S.trialSelected.push(i);render()}
function submitTrialP1(){if(S.trialSelected.length!==TRIAL.phase1.correctCount)return;S.trialSubmitted=true;let c=0;
S.trialSelected.forEach(i=>{if(TRIAL.phase1.arguments[i].correct){c++;let m={0:'Clause modification technique',1:'Mise en demeure vendeur',3:'Photos affichage prix',5:'Contrat prestataire'};if(m[TRIAL.phase1.arguments[i].id])S.trialEvidence.push(m[TRIAL.phase1.arguments[i].id])}});
S.trialScore=c*150;addScore(c*150);render()}
function startTrialP2(){S.trialPhase=1;S.trialRound=0;S.trialSelected=[];S.trialSubmitted=false;render()}
function selectTrialOpt(i){if(S.trialSubmitted)return;S.trialSelected=[i];render()}
function submitTrialRound(){if(!S.trialSelected.length||S.trialSubmitted)return;S.trialSubmitted=true;let r=TRIAL.phase2.rounds[S.trialRound],c=r.options[S.trialSelected[0]];
if(c.correct){S.trialScore+=200;addScore(200);if(r.evidence)S.trialEvidence.push(r.evidence)}else{S.score=Math.max(0,S.score-50)}render()}
function nextTrialRound(){S.trialRound++;S.trialSelected=[];S.trialSubmitted=false;render()}
function showVerdict(){S.trialPhase=2;render()}

render();
</script>
</body>
</html>
